server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      discovery:
        locator:
          lower-case-service-id: true

      routes:

        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/auth/**

        - id: campaign-service
          uri: lb://CAMPAIGN-SERVICE
          predicates:
            - Path=/campaign/**

        - id: account-service
          uri: lb://ACCOUNT-SERVICE
          predicates:
            - Path=/account/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka